<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5f2"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe5de"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e11d2a"/>
      <stop offset="1" stop-color="#b30f1b"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5a32" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff5a32" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="320" fill="url(#flame)"/>
  <circle cx="1080" cy="560" r="300" fill="url(#ember)"/>

  <!-- avatar monogram -->
  <g transform="translate(96,190)">
    <rect width="200" height="200" rx="48" fill="url(#ink)"/>
    <text x="100" y="138" text-anchor="middle" font-family="Georgia, serif"
          font-size="104" font-weight="700" fill="#ffffff" letter-spacing="-2">SB</text>
    <circle cx="176" cy="30" r="14" fill="#ff7a18"/>
  </g>

  <!-- text -->
  <text x="340" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="32"
        fill="#c0461a" font-style="italic">Pendamping Produk &amp; Member Atomy</text>
  <text x="338" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="78"
        font-weight="700" fill="#470606" letter-spacing="-2">Si Batu Kali</text>
  <text x="338" y="398" font-family="Georgia, 'Times New Roman', serif" font-size="78"
        font-weight="700" fill="#470606" letter-spacing="-2">Menjadi Berlian</text>
  <text x="342" y="458" font-family="Georgia, serif" font-size="32" font-style="italic"
        fill="#b30f1b">Sehat &amp; berdaya, untuk setiap keluarga.</text>

  <rect x="342" y="494" width="64" height="6" rx="3" fill="#ff7a18"/>
</svg>
