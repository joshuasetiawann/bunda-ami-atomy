# ──────────────────────────────────────────────────────────────────────────
#  Auto-deploy ke GitHub Pages setiap kali ada push ke branch `main`.
#
#  Cara mengaktifkan (sekali saja):
#  1. Buka repo di GitHub -> Settings -> Pages
#  2. Bagian "Build and deployment" -> Source: pilih "GitHub Actions"
#  3. Selesai. Setiap push ke main akan otomatis ter-publish.
#     Alamat: https://joshuasetiawann.github.io/bunda-ami-atomy/
# ──────────────────────────────────────────────────────────────────────────
name: Deploy ke GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build dengan Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
